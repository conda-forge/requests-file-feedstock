{% set name = "requests-file" %}
{% set version = "3.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 68789589cfde7098e8933fe3e69bbd864f7f0c22f118937b424d94d0e1b7760f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.2
    - setuptools-scm >=3.4.3
    - pip
  run:
    - python >={{ python_min }}
    - requests >=1.0.0

test:
  imports:
    - requests_file
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://github.com/dashea/requests-file
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: File transport adapter for Requests

extra:
  recipe-maintainers:
    - ocefpaf
